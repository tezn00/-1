/* script for auto update */
var ggWebSocket;

function ggCreateWebSocket() {
	try {
		const isHttps=location.protocol !== 'https:';
		const wsUrl=(isHttps?'ws://':'wss://') + window.location.hostname + (window.location.port?(':' + window.location.port):"");
		console.log("Connect to: " + wsUrl);
		ggWebSocket=new WebSocket(wsUrl);
		ggWebSocket.addEventListener('open', function (event) {
			ggWebSocket.send(JSON.stringify({ action: 'register', folder:'ZQ2XUDBB', url: Location.href }));
		});
		ggWebSocket.addEventListener('close', function (event) {
		});
		ggWebSocket.addEventListener('message', function (event) {
			let msg=JSON.parse(event.data);
			if (msg) {
				switch (msg.action) {
					case 'reload': {
						try {
							localStorage.setItem('p2vrState', JSON.stringify(pano.getPlayerState()));
						} catch(e) {
							console.log(e);
						}
						setTimeout(() => { location.reload(); },0);
						ggWebSocket.send(JSON.stringify({ status: 'ok' }));
						break;
					};
					case 'goto': {
						console.log(msg.url);
						setTimeout(() => { location.assign(msg.url); },0);
						ggWebSocket.send(JSON.stringify({ status: 'ok' }));
						break;
					};
				};
			};
		});
	} catch(e) {
		console.log(e);
	}
}
	
window.addEventListener("load", (event) => {
	ggCreateWebSocket();
	try {
		let state=JSON.parse(localStorage.getItem('p2vrState'));
		localStorage.removeItem('p2vrState');
		if (state) {
			if (state.currentNode) {
				pano.startNode=state.currentNode;
			}
			pano.on("configloaded",function() {
				pano.setPlayerState(state);
			});
		}
	} catch(e) {
		console.log(e);
	}
});

		<script type="text/javascript">
		function parseParams(paramsString, params) {
			paramsString = paramsString.substring(1);
			var firstSeparatorPos = paramsString.indexOf(",");
			if (firstSeparatorPos != -1) {
				params.startNode = paramsString.slice(0, firstSeparatorPos);
				var viewingParamsString = paramsString.slice(firstSeparatorPos + 1);
				var viewingParams = viewingParamsString.split(",");
				if (viewingParams.length >= 3) {
					var startView = {};
					startView["pan"] = viewingParams[0];
					startView["tilt"] = viewingParams[1];
					startView["fov"] = viewingParams[2];
					if (viewingParams.length >= 4) {
						startView["projection"] = viewingParams[3];
					}
					params.startView = startView;
				}
			} else {
				params.startNode = paramsString;
				params.startView = "";
			}
		}
		var params = {};
		parseParams(document.location.hash, params);
		var startNode = params.startNode;
		var startView = params.startView;
		if (("onhashchange" in window) && (!(/MSIE (\d+\.\d+);/.test(navigator.userAgent)))) {
			window.onhashchange = function () {
				parseParams(window.location.hash, params);
				pano.openNext('{' + params.startNode + '}', params.startView);
			}
		} else {
			var lastHash = window.location.hash;
			window.setInterval(function () {
				if (window.location.hash != lastHash) {
					lastHash = window.location.hash;
					parseParams(window.location.hash, params);
					pano.openNext('{' + params.startNode + '}', params.startView);
				}
			}, 100);
		}
			// create the panorama player with the container
